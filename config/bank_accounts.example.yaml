# Tier 4 bank-account registry.
#
# This file carries NO secrets (only env-var names and folder paths), so — like
# sharepoint.example.yaml — it holds the real account config and the weekly run
# copies it to config/bank_accounts.yaml (gitignored) at start. Edit it directly.
# If config/bank_accounts.yaml is absent at run time, Tier 4 is skipped.
#
# Statements are pulled from each account's SharePoint `sharepoint_folder` (via
# Microsoft Graph, same creds as the QB-export pull) into the bank-dir
# (<data-dir>/bank, gitignored) before reconciliation, then matched by
# `statement_glob`.
#
# SECURITY (CLAUDE.md):
#   - NO raw account numbers here. Each account names an environment variable
#     (account_number_env); the run reads the number at runtime and hashes it
#     (core/fingerprint.py) — it is never stored or committed.
#   - Statement PDFs and check images stay in SharePoint / the gitignored bank-dir;
#     only hashed fingerprints, reads, and SharePoint path refs are persisted.
#
# One entry per (entity, account). `entity_id` must exist in config/entities.yaml.

accounts:
  # Pilot: Hines Homes operating account at First Service Bank. The bank only
  # offers PDF statements (no CSV), so they are parsed positionally by the
  # `first_service_bank` layout (bank/statement_extract.py). Set the account
  # number as the GitHub Actions secret HINES_HOMES_OPERATING_ACCT.
  - entity_id: hines-homes
    label: operating
    format: pdf
    layout: first_service_bank
    statement_glob: "hines-homes/operating/*.pdf"
    account_number_env: HINES_HOMES_OPERATING_ACCT
    sharepoint_folder: "Personal Folders/Brandon/Claude Code/acct-wizard/HinesHomes/FirstServiceStatements"
    # Cancelled-check images are embedded in the First Service Bank statement PDF
    # itself ("Images: 92"). `source: statement_pdf` renders each check face out of
    # the statement (keyed by check number) and feeds the T4-03/04/05 vision reads —
    # no separate image files to sync. Needs --check-images auto/on + ANTHROPIC_API_KEY.
    # `latest_only` reads images from just the most recent statement (so a multi-
    # month backfill reconciles every statement but only vision-reads the latest
    # month's checks — the rest reconcile on amount/number without an image read).
    check_images:
      source: statement_pdf
      latest_only: true

