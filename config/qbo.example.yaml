# Pull QB reports straight from QuickBooks Online via the Intuit Accounting API,
# instead of hand-dropping exports (the QBO analog of sharepoint.example.yaml).
# This file carries NO secrets. Copy it to config/qbo.yaml (gitignored); if
# config/qbo.yaml is absent at run time, the QBO pull is skipped.
#
# WHICH ENTITIES ARE ON QBO
#   Every entity is on QuickBooks Online EXCEPT Hines Homes and Titan House, which
#   still export from QB Desktop and land via SharePoint (config/sharepoint.yaml).
#   The SharePoint pull skips any entity sourced from QBO, so there is no double-pull.
#
# TWO WAYS TO AUTHORIZE A COMPANY
#
#   (A) From the review UI  ── recommended, and how you add Hines Homes / Titan
#       House later ──────────────────────────────────────────────────────────────
#       Open the review site → Connections (review-ui/app/qbo), click Connect next to
#       a company, and approve read access in Intuit. The company's realm id and
#       refresh token are stored in financial_forensics.qbo_connections. With
#       `--store supabase`, the weekly run reads the realm + token straight from there
#       — you do NOT need to fill in realm_id or a refresh-token secret below, and an
#       authorized company is pulled even if it isn't listed here. You only set the
#       app credentials QBO_CLIENT_ID / QBO_CLIENT_SECRET (see review-ui/README.md for
#       where to put them on Vercel, and the weekly workflow for GitHub).
#
#   (B) Env / OAuth Playground  ── no-Supabase fallback ─────────────────────────────
#       Obtain each company's refresh token once via Intuit's OAuth Playground and set
#       it as the named secret, and set realm_id here. Used when running without
#       `--store supabase`.
#
# SETTINGS
#   environment:   production | sandbox   (default production)
#   lookback_days: rolling window pulled when --since isn't passed (default 120)
#
# Per entity (all optional under path A):
#   realm_id           the QBO company id — omit to use the one saved by the UI
#                      connect flow (or set realm_id_env to read it from an env var)
#   refresh_token_env  name of the env var holding this company's refresh token
#                      (path B only; omit under path A)
#   reports            optional: limit to a subset of the known report stems
#                      (default: all — qb__vendor_transaction_detail,
#                      qb__general_ledger, qb__credit_memos, qb__vendor_list)

environment: production
lookback_days: 120

# Entities on QBO. Under path (A) these need no realm_id/refresh_token_env — the UI
# connection supplies both. Listing them here is optional but keeps the intended set
# explicit; connecting a company from the UI is enough for it to be pulled.
entities:
  hope-filled: {}
  l2f-ventures: {}
  blue-tree-realty: {}
  stonebrook-poa: {}
  mojuva: {}
  13525wm: {}

  # --- Not yet on QBO (still QB Desktop → SharePoint; see sharepoint.yaml) --------
  # When these migrate, connect them from the review UI's Connections page (or add a
  # realm_id here) and remove them from config/sharepoint.yaml.
  # hines-homes: {}
  # titan-house: {}

  # Example of the env / Playground path (B) for one company:
  # mojuva:
  #   realm_id: "1234567890"
  #   refresh_token_env: QBO_REFRESH_TOKEN_MOJUVA
