# Tier 1 rule parameters. Tune these during the pilot based on the
# false-positive log — do not change rule logic to tune, change thresholds.

defaults:
  # T1-04: payments below this each, summing above it, within window_days.
  # min_fraction: only payments at/above this fraction of the threshold count as
  # potential split pieces — a builder's weekly supplier run is many small
  # payments (cadence), whereas threshold-dodging uses near-threshold checks.
  approval_threshold: 5000
  threshold_split_window_days: 7
  threshold_split_min_fraction: 0.5

  # T1-02: fuzzy duplicate tolerances. The window is the max gap between two
  # same-vendor, near-equal payments still treated as a possible duplicate. Kept
  # short: a genuine double-pay of one invoice lands within days, whereas a 60-day
  # window flags ordinary recurring bills (biweekly cleaning, monthly software) as
  # duplicates. 10 days excludes biweekly/monthly cadences; raise if real
  # duplicates are being missed.
  fuzzy_dup_amount_tolerance: 1.00
  fuzzy_dup_window_days: 10

  # T1-08: a vendor with at least this many bill payments is "AP-workflow";
  # a direct manual check to them is then flagged as a workflow bypass.
  ap_vendor_established_min: 3

  # T1-09: reconcile each payment to a bill (or a sum of bills) by amount, per
  # vendor. amount_tolerance: cents of slack on a match; lookback_days: how far
  # before a payment a matching bill may be dated; max_combo: most invoices one
  # payment (batch check) may cover in the sum match.
  invoice_match_amount_tolerance: 0.01
  invoice_match_lookback_days: 120
  invoice_match_max_combo: 4

  # T1-07: weekdays AP batches normally run (0=Mon … 6=Sun).
  # Empty = rule disabled. Hines data shows Wednesday-dominant cadence
  # (~60%) — set to [2] only if strict batch days become policy.
  ap_run_weekdays: []

  # T1-10: vendor-name token sort ratio above which two vendors are flagged
  vendor_similarity_threshold: 85

  # T1-11: new vendor + large first payment
  new_vendor_days: 30
  new_vendor_payment_threshold: 5000

  # T1-23: wrong-entity heuristic — vendor is "established" in an entity at
  # this many transactions; a stray posting elsewhere below stray_max is flagged
  wrong_entity_established_min: 5
  wrong_entity_stray_max: 2

  # T1-20: vendor/cost-code mismatch — a vendor's "home" cost code is one used at
  # least established_min times; a code used at most stray_max times is a stray.
  vendor_costcode_established_min: 4
  vendor_costcode_stray_max: 1

  # T1-24: inter-company balances must agree within this tolerance
  intercompany_tolerance: 0.01

  # T1-30: credit memos / write-offs above this are listed for review
  credit_memo_threshold: 250

  # Tier 4 bank reconciliation (three-way match)
  bank_amount_tolerance: 0.01      # cleared vs recorded amount must agree within this
  bank_date_tolerance_days: 5      # non-check match: bank date vs book date window
  clearing_gap_days: 30            # recorded→cleared gap beyond this is flagged
  check_match_max_days: 180        # a check-number match must clear within this many
                                   # days of the recorded date — numbers recycle over
                                   # an account's life, and an undated match pairs a
                                   # years-old cleared check with today's book entry
                                   # (false CRITICAL "alteration")
  bank_min_critical_amount: 50     # unmatched bank lines below this are INFO, not
                                   # CRITICAL/MEDIUM — a $3 unexplained debit is a
                                   # question, not an incident

  # Tier 4 check-image vision reads (T4-03/04/05)
  check_image_min_confidence: 90   # read confidence (0–100) below this → human review queue

  # Tier 4 (T4-07/T4-09): internal cash-management sweep / linked-account transfers.
  # A "sweep" is an automatic same-institution movement between an entity's own
  # operating account and a linked sweep sub-account (e.g. a Cash Manager that
  # parks balances above a floor overnight to earn interest and returns them the
  # next morning). These clear the bank as transfer debits and credits but by
  # design carry NO third-party book entry — the bookkeeper doesn't journal each
  # nightly sweep — so without recognition every sweep-out is a false T4-09
  # (unrecorded disbursement) and every sweep-back a false T4-07 (unexplained
  # inflow). A line whose description matches any pattern below is treated as an
  # internal transfer: matched, rolled into one INFO note per entity/side, and
  # never raised as an exception. Only NEW money in the sweep account (interest
  # income) is a genuine unmatched item, and it lands on the sweep account's own
  # statement, not the operating account's.
  #
  # Patterns are case-insensitive regexes matched against the statement
  # description. They name NO account numbers (CLAUDE.md: raw/partial account
  # numbers never enter the repo) — the "Account Ending in NNNN" phrasing is
  # matched generically, and only the bank's specific sweep wording (not generic
  # "online transfer" lines, which are discretionary and stay reviewable) is
  # listed. Empty list = sweep recognition off.
  sweep_transfer_patterns:
    - 'trnsfr (to|from) account ending in \d{3,}'   # First Service Bank Cash Manager sweep

  # Tier 1/4: merchant card/ACH processing fees (e.g. QuickBooks Payments / Intuit).
  # Client invoice payments taken through a payment processor deposit GROSS, and the
  # processor debits its fee separately per settlement. Those fees are legitimate,
  # recurring per-deposit charges — NOT duplicate payments (T1-01/02) or unrecorded
  # disbursements (T4-09). QuickBooks Payments pricing: bank/ACH ("Check E-Invoice")
  # = 1% capped at $15/txn; card ("Card E-Invoice") = 3.5% + $0.30/txn. Recognized
  # by description/vendor pattern and reconciled against the processor's own gross
  # deposits at the expected rate; anything above the expected fee band (e.g. a
  # material "PYMT SOLN" debit — a refund/chargeback/funding reversal) is NOT
  # auto-recognized and stays reviewable. Patterns are case-insensitive regexes.
  merchant_processor_patterns:     # vendor-name / bank-description tags for a processor
    - 'intuit'
    - 'quickbooks'
  merchant_fee_desc_patterns:      # bank-line descriptions that ARE a processor fee
    - 'tran fee'
  merchant_deposit_desc_patterns:  # bank-line descriptions that are processor gross deposits
    - 'deposit'
  merchant_fee_max_flat: 15.0      # per-transaction $ cap (QBO bank/ACH 1% capped $15);
                                   # a processor charge at/below this is always a plausible fee
  merchant_fee_max_rate: 0.04      # a processor fee above this fraction of the deposits it
                                   # settles (QBO card 3.5% + $0.30, rounded up) is NOT a fee
  merchant_fee_window_days: 5      # match a fee to the processor deposits within this window
  merchant_fee_dup_ceiling: 250.0  # T1-01/02: a processor charge at/below this is a
                                   # per-settlement fee, not a duplicate payment (max observed
                                   # daily fee ~$191); larger processor payments still flag

  # Tier 2 statistical checks
  round_number_base: 100           # T2-02: "round" = an exact multiple of this dollar amount
  round_number_min_count: 12       # T2-02: min payments before the round ratio is meaningful
  round_number_ratio: 0.6          # T2-02: flag when at least this fraction are round
  benford_min_count: 40            # T2-02: min sample to test first-digit distribution
  benford_chi2_critical: 20.09     # T2-02: chi-square df=8 critical value (~p<0.01)
  payment_timing_weekly: false     # T2-10: off in weekly runs (quarterly trend review —
                                   # per-job construction vendors have irregular cadence,
                                   # so weekly INFO flags are queue noise)
  payment_timing_min_payments: 6   # T2-10: min payments to assess a vendor's cadence
  payment_timing_mad_z: 3.5        # T2-10: robust (MAD) modified z-score outlier threshold
  concentration_shift_threshold: 0.25  # T2-05: share rise (fraction) vs baseline to flag
  concentration_dominance: 0.5         # T2-05: only flag once a vendor holds >= this share
  concentration_min_total: 1000        # T2-05: ignore cost codes with little spend

# Account-name pattern that identifies inter-company GL accounts, e.g.
# "Due from Beta", "1920 · Loan to 13525WM, LLC". Group 1 = kind (due|loan),
# group 2 = direction (to|from), group 3 = counterparty name resolved against
# entity names/aliases in entities.yaml. Direction semantics: due-from and
# loan-to are assets (they owe me); due-to and loan-from are liabilities.
intercompany_account_pattern: "(?i)\\b(due|loan)s?\\s+(to|from)\\s+(.+)"
