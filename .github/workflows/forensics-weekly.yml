name: Weekly forensics run

# Pulls the latest QB exports from SharePoint and runs the full detection battery on
# a schedule — no hand-running. Findings land in the review site (Supabase); the
# exceptions workbook is attached to the run as a downloadable artifact.
#
# One-time setup — add these as repository secrets
# (Settings → Secrets and variables → Actions → New repository secret):
#   GRAPH_TENANT_ID, GRAPH_CLIENT_ID, GRAPH_CLIENT_SECRET, GRAPH_DRIVE_ID
#                                (SharePoint pull for the QB Desktop entities —
#                                 Hines Homes, Titan House)
#   QBO_CLIENT_ID, QBO_CLIENT_SECRET
#                                (Intuit app credentials for the QuickBooks Online
#                                 pull — every entity except Hines Homes/Titan House)
#   QBO_REFRESH_TOKEN_*          (one per QBO company, named in config/qbo.yaml:
#                                 QBO_REFRESH_TOKEN_HOPE_FILLED, _L2F_VENTURES,
#                                 _BLUE_TREE_REALTY, _STONEBROOK_POA, _MOJUVA,
#                                 _13525WM. Rotations are persisted to Supabase.)
#   SUPABASE_URL, SUPABASE_SERVICE_KEY
#   ANTHROPIC_API_KEY            (optional — enables the Tier 3 AI review)
#   HINES_HOMES_OPERATING_ACCT   (Tier 4 — First Service Bank operating account
#                                 number; hashed at runtime, never stored)
#   HINES_HOMES_OZK_ACCT         (Tier 4 — Bank OZK account number; hashed at
#                                 runtime, never stored)

on:
  schedule:
    - cron: "0 13 * * 1"     # every Monday 13:00 UTC (~7–8am Central) — adjust as you like
  workflow_dispatch:           # plus a manual "Run workflow" button to run on demand
    inputs:
      tier3:
        description: "Tier 3 review mode"
        type: choice
        default: auto
        options:
          - auto        # Claude (Sonnet) review — full quality, capped per run
          - batch       # Claude via the Message Batches API — half cost, uncapped;
                        # use to clear a large backlog (first run / stub re-review)
          - heuristic   # deterministic offline triage — no API, completes in minutes
          - "off"       # skip Tier 3 entirely

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    # A batch-mode drain polls the async Message Batch for up to TIER3_BATCH_TIMEOUT
    # (4h) below; give the job room to finish that plus the pulls/rules, staying just
    # under the runner's 6h hard cap so a genuinely stuck run self-cancels cleanly.
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Configure QBO + SharePoint pull + Tier 4 accounts
        run: |
          cp config/qbo.example.yaml config/qbo.yaml
          cp config/sharepoint.example.yaml config/sharepoint.yaml
          cp config/bank_accounts.example.yaml config/bank_accounts.yaml
      - name: Pull exports + run the detection battery
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_DRIVE_ID: ${{ secrets.GRAPH_DRIVE_ID }}
          # QuickBooks Online — app creds + one refresh token per QBO company
          QBO_CLIENT_ID: ${{ secrets.QBO_CLIENT_ID }}
          QBO_CLIENT_SECRET: ${{ secrets.QBO_CLIENT_SECRET }}
          QBO_REFRESH_TOKEN_HOPE_FILLED: ${{ secrets.QBO_REFRESH_TOKEN_HOPE_FILLED }}
          QBO_REFRESH_TOKEN_L2F_VENTURES: ${{ secrets.QBO_REFRESH_TOKEN_L2F_VENTURES }}
          QBO_REFRESH_TOKEN_BLUE_TREE_REALTY: ${{ secrets.QBO_REFRESH_TOKEN_BLUE_TREE_REALTY }}
          QBO_REFRESH_TOKEN_STONEBROOK_POA: ${{ secrets.QBO_REFRESH_TOKEN_STONEBROOK_POA }}
          QBO_REFRESH_TOKEN_MOJUVA: ${{ secrets.QBO_REFRESH_TOKEN_MOJUVA }}
          QBO_REFRESH_TOKEN_13525WM: ${{ secrets.QBO_REFRESH_TOKEN_13525WM }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HINES_HOMES_OPERATING_ACCT: ${{ secrets.HINES_HOMES_OPERATING_ACCT }}
          HINES_HOMES_OZK_ACCT: ${{ secrets.HINES_HOMES_OZK_ACCT }}
          # batch mode exists to drain a backlog in one run — lift the per-run cap
          TIER3_MAX_REVIEW: ${{ github.event.inputs.tier3 == 'batch' && '0' || '200' }}
          # ...and give the async Message Batch room to finish (the API's SLA is 24h);
          # a 1h ceiling clipped large drains. Only consulted in batch mode; kept
          # under the job's timeout-minutes so the batch degrades gracefully first.
          TIER3_BATCH_TIMEOUT: "14400"
        run: python -u -m skill.run --pull-qbo on --pull-sharepoint on --store supabase --tier3 ${{ github.event.inputs.tier3 || 'auto' }}
      - name: Attach exceptions workbook
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exceptions-workbook
          path: output/*.xlsx
          if-no-files-found: ignore
