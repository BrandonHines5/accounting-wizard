name: Cash position

# On-demand treasury snapshot: live bank balances + monthly P&L per QBO-connected
# company (skill/cash_position.py). Read-only against Intuit; refresh-token
# rotation is persisted to Supabase exactly like the weekly forensics run, so
# running this never breaks the weekly pull's connections. Results land in the
# job log (JSON between markers) and as a downloadable artifact.

on:
  workflow_dispatch:
    inputs:
      months:
        description: "Trailing complete months of P&L to pull"
        required: false
        default: "6"

permissions:
  contents: read

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Configure QBO
        run: cp config/qbo.example.yaml config/qbo.yaml
      - name: Pull balances + P&L
        env:
          QBO_CLIENT_ID: ${{ secrets.QBO_CLIENT_ID }}
          QBO_CLIENT_SECRET: ${{ secrets.QBO_CLIENT_SECRET }}
          # First-run bootstrap seeds; Supabase-stored rotations win once present.
          QBO_REFRESH_TOKEN_HOPE_FILLED: ${{ secrets.QBO_REFRESH_TOKEN_HOPE_FILLED }}
          QBO_REFRESH_TOKEN_L2F_VENTURES: ${{ secrets.QBO_REFRESH_TOKEN_L2F_VENTURES }}
          QBO_REFRESH_TOKEN_BLUE_TREE_REALTY: ${{ secrets.QBO_REFRESH_TOKEN_BLUE_TREE_REALTY }}
          QBO_REFRESH_TOKEN_STONEBROOK_POA: ${{ secrets.QBO_REFRESH_TOKEN_STONEBROOK_POA }}
          QBO_REFRESH_TOKEN_MOJUVA: ${{ secrets.QBO_REFRESH_TOKEN_MOJUVA }}
          QBO_REFRESH_TOKEN_13525WM: ${{ secrets.QBO_REFRESH_TOKEN_13525WM }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m skill.cash_position --months "${{ github.event.inputs.months || '6' }}"
      - name: Attach artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cash-position
          path: |
            output/cash_position.json
            output/cash_position_balances.csv
            output/cash_position_pnl.csv
          if-no-files-found: ignore
